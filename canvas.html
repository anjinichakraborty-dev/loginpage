<html>
<title>
Canvas
</title>
<link rel="icon" type="image/png" href="favicon.png.png" />
<body style="background-color:grey">
<p style="background-color:grey;color:transparent;">Lorem ipsum...</p>

<canvas id="myCanvas" width="1000" height="1000" >
</canvas>

<script>
const canvas = document.getElementById("myCanvas");
const ctx = canvas.getContext("2d");
for (let i = 0; i < 50; i++) {
  for (let j = 0; j < 50; j++) {
    ctx.fillStyle = `rgb(
        ${Math.floor(255 - 6 * i)}
        ${Math.floor(255 - 6 * j)}
        75)`;
    ctx.fillRect(j * 11, i * 11, 11, 11);
  }
}
</script>
<br>
</body>
</html>
